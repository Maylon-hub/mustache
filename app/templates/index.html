{% extends "base.html" %}

{% block content %}
<div class="mustache-layout">
    <!-- Top Pane: Dendrogram (Meta-Clusters) -->
    <div class="pane pane-top card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>Dendrogram</span>
            <button class="btn btn-sm btn-outline-secondary" onclick="openBatchConfigModal()"><i class="fas fa-layer-group"></i> Run Batch</button>
        </div>
        <div class="card-body p-0">
            <div id="meta-dendrogram" style="height: 400px; width: 100%;"></div>
        </div>
    </div>

    <!-- Bottom Panes -->
    <div class="pane-bottom-container">
        <!-- Bottom Left: HAI Matrix -->
        <div class="pane pane-bottom-left card">
            <div class="card-header">HAI Plot</div>
            <div class="card-body p-0">
                <div id="hai-heatmap" style="height: 400px; width: 100%;"></div>
            </div>
        </div>

        <!-- Bottom Right: Reachability Plots -->
        <div class="pane pane-bottom-right card">
            <div class="card-header">Reachability Plots</div>
            <div class="card-body p-0">
                <!-- We will append multiple reachability plots here side-by-side -->
                <div id="reachability-container" class="d-flex" style="overflow-x: auto; height: 400px;">
                    <!-- JS will populate individual reachability plots -->
                    <div class="text-muted p-3">Run Batch Analysis to generate meta-clusters.</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Configuration Modal for Batch -->
<div class="modal fade" id="batchConfigModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Configure Multiple Clustering Hierarchies Explorer</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form id="batch-form" enctype="multipart/form-data">
                    <div class="form-group">
                        <label>Dataset (CSV) <span class="required">*</span></label>
                        <input type="file" class="form-control-file" name="file" required>
                    </div>
                    <hr>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Min <code>mpts</code></label>
                                <input type="number" class="form-control" name="min_mpts" value="2" min="2">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Max <code>mpts</code></label>
                                <input type="number" class="form-control" name="max_mpts" value="50" min="2">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Step Size</label>
                                <input type="number" class="form-control" name="step" value="2" min="1">
                            </div>
                        </div>
                    </div>
                    <div class="text-right mt-3">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success"><i class="fas fa-play"></i> Run Explore</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
